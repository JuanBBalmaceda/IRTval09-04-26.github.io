<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<title>Validación</title>

<style>

body{
  margin:0;
  background:#f2f2f2;
  font-family:'Montserrat',sans-serif;
}

/* CONTENEDOR */
.container{
  max-width:1280px;
  margin:30px auto;
  padding:0 40px;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:25px;
}

.logo{
  display:flex;
}

.logo div{
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:700;
  font-size:22px;
}

.logo .i{background:#1e5c66;}
.logo .r{background:#ef9a2d;}
.logo .t{background:#ef9a2d;}

.header span{
  color:#1e5c66;
  font-size:14px;
  letter-spacing:2px;
  font-weight:600;
}

/* MAIN */
.main{
  display:flex;
  align-items:center;
  gap:70px;
}

/* IMAGEN */
.img img{
  width:640px;
  border-radius:25px;
}

/* TEXTO */
.content{
  max-width:520px;
}

/* TITULO */
.title{
  display:flex;
  align-items:center;
  gap:12px;
  color:#1e5c66;
  margin-bottom:20px;
}

.check{
  width:22px;
  height:22px;
  border:2px solid #1e5c66;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
}

.title h2{
  font-size:22px;
  margin:0;
  font-weight:600;
}

/* SUBTITLE */
.subtitle{
  font-size:24px;
  font-weight:700;
  margin-bottom:20px;
}

/* INFO */
.info p{
  margin:8px 0;
  font-size:18px;
}

.info strong{
  font-weight:700;
}

/* FOOTER */
.footer{
  margin-top:60px;
  background:#d9d9d9;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.icons{
  display:flex;
  gap:15px;
}

.icon{
  width:34px;
  height:34px;
  border-radius:50%;
  background:#666;
}

/* RESPONSIVE */
@media(max-width:1000px){
  .main{
    flex-direction:column;
  }

  .img img{
    width:100%;
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">
      <div class="i">I</div>
      <div class="r">R</div>
      <div class="t">T</div>
    </div>
    <span>MEDICINA PARA EMPRESAS</span>
  </div>

  <div class="main">

    <div class="img">
      <img src="https://images.unsplash.com/photo-1584982751601-97dcc096659c">
    </div>

    <div class="content">

      <div class="title">
        <div class="check">✔</div>
        <h2>VALIDACIÓN DE EXÁMENES</h2>
      </div>

      <div class="subtitle">CONSUMIDOR FINAL (ANSV)</div>

      <div class="info">
        <p><strong>Examen:</strong> 01-00958676</p>
        <p><strong>Fecha:</strong> 08/04/2026</p>
        <p><strong>Tipo de Examen:</strong> EXAMEN PREOCUPACIONAL</p>
        <p><strong>Apellido y Nombre:</strong> BALMACEDA, JUAN BAUTISTA</p>
        <p><strong>DNI:</strong> 44306923</p>
        <p><strong>Dictamen médico:</strong> APTO</p>
      </div>

    </div>

  </div>

</div>

<div class="footer">
  <div>www.irt.com.ar</div>

  <div class="icons">
    <div class="icon"></div>
    <div class="icon"></div>
    <div class="icon"></div>
    <div class="icon"></div>
  </div>
</div>

</body>
</html>
